kind: source
spec:
  name: aws
  path: cloudquery/aws
  version: "v27.23.1" # latest version of aws plugin
  tables: ["*"]
  destinations: ["postgresql"]
---
kind: destination
spec:
  name: postgresql
  path: cloudquery/postgresql
  version: "v8.6.2" # latest version of postgresql plugin
  spec:
    connection_string: ${CQ_DSN}
